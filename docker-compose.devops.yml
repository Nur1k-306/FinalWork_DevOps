name: smart-laundry-devops-final

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - smart-laundry-devops
  logging: *default-logging

x-backend-env: &backend-env
  JWT_SECRET: smart-laundry-super-secret-key-please-change
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  MANAGEMENT_TRACING_ENABLED: "false"
  OTEL_SDK_DISABLED: "true"

services:
  frontend:
    <<: *service-defaults
    image: smart-laundry/frontend:${TAG:-latest}
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_started

  api-gateway:
    <<: *service-defaults
    image: smart-laundry/api-gateway:${TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      <<: *backend-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      USER_SERVICE_URL: http://user-service:8081
      DEVICE_SERVICE_URL: http://device-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      WASH_SERVICE_URL: http://wash-session-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      device-service:
        condition: service_started
      booking-service:
        condition: service_started
      payment-service:
        condition: service_started
      wash-session-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started

  user-service:
    <<: *service-defaults
    image: smart-laundry/user-service:${TAG:-latest}
    environment:
      <<: *backend-env
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/users_db
      USER_SERVICE_DB_USERNAME: postgres
      USER_SERVICE_DB_PASSWORD: postgres
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  device-service:
    <<: *service-defaults
    image: smart-laundry/device-service:${TAG:-latest}
    environment:
      <<: *backend-env
      DEVICE_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/devices_db
      DEVICE_SERVICE_DB_USERNAME: postgres
      DEVICE_SERVICE_DB_PASSWORD: postgres
      DEVICE_SERVICE_MONGO_URI: mongodb://mongodb:27017/device_service
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  booking-service:
    <<: *service-defaults
    image: smart-laundry/booking-service:${TAG:-latest}
    environment:
      <<: *backend-env
      BOOKING_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/bookings_db
      BOOKING_SERVICE_DB_USERNAME: postgres
      BOOKING_SERVICE_DB_PASSWORD: postgres
      DEVICE_SERVICE_URL: http://device-service:8082
      BOOKING_EXPIRATION_SECONDS: "300"
      BOOKING_EXPIRATION_CHECK_MS: "5000"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      device-service:
        condition: service_started

  payment-service:
    <<: *service-defaults
    image: smart-laundry/payment-service:${TAG:-latest}
    environment:
      <<: *backend-env
      PAYMENT_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/payments_db
      PAYMENT_SERVICE_DB_USERNAME: postgres
      PAYMENT_SERVICE_DB_PASSWORD: postgres
      BOOKING_SERVICE_URL: http://booking-service:8083
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      booking-service:
        condition: service_started

  wash-session-service:
    <<: *service-defaults
    image: smart-laundry/wash-session-service:${TAG:-latest}
    environment:
      <<: *backend-env
      WASH_SERVICE_MONGO_URI: mongodb://mongodb:27017/wash_service
      WASH_DURATION_SECONDS: "2400"
      WASH_COMPLETION_CHECK_MS: "5000"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    <<: *service-defaults
    image: smart-laundry/notification-service:${TAG:-latest}
    environment:
      <<: *backend-env
      NOTIFICATION_SERVICE_MONGO_URI: mongodb://mongodb:27017/notification_service
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started

  analytics-service:
    <<: *service-defaults
    image: smart-laundry/analytics-service:${TAG:-latest}
    environment:
      <<: *backend-env
      ANALYTICS_SERVICE_MONGO_URI: mongodb://mongodb:27017/analytics_service
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    <<: *service-defaults
    image: postgres:16.4
    env_file:
      - ./infra/postgres/postgres.env
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-init:
    <<: *service-defaults
    image: postgres:16.4
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./infra/postgres/postgres.env
    command: ["/bin/sh", "/opt/smart-laundry/reconcile-postgres.sh"]
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/reconcile-postgres.sh:/opt/smart-laundry/reconcile-postgres.sh:ro

  mongodb:
    <<: *service-defaults
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./infra/mongodb/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis:7.2
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *service-defaults
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  loki:
    <<: *service-defaults
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

  promtail:
    <<: *service-defaults
    image: grafana/promtail:3.1.1
    user: "0:0"
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    <<: *service-defaults
    image: grafana/grafana:11.0.0
    depends_on:
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources/loki-datasource.yml:/etc/grafana/provisioning/datasources/loki-datasource.yml:ro

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  minio-data:
  loki-data:
  grafana-data:

networks:
  smart-laundry-devops:
